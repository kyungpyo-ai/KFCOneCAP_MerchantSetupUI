<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KFTCOneCAP Payment Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #0066FF;
            --bg-gray: #F8F9FA;
            --border: #E9ECEF;
            --text-main: #191F28;
            --text-sub: #4E5968;
            --text-muted: #8B95A1;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #D1D1D1;
            display: flex; justify-content: center; padding: 40px 0; margin: 0;
        }

        .window {
            width: 720px; background: var(--white); border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden;
        }

        /* [타이틀 개선] 이미지와 100% 일치하도록 조정 */
        .header { 
            padding: 32px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
        }
        .header-icon {
            width: 52px; height: 52px; 
            background: var(--primary); 
            border-radius: 14px; /* 이미지의 둥근 모서리 값 */
            display: flex; justify-content: center; align-items: center; 
            margin-right: 18px;
            flex-shrink: 0;
        }
        .header-info h1 { 
            margin: 0; 
            font-size: 20px; 
            color: var(--text-main); 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }
        .header-info p { 
            margin: 4px 0 0; 
            font-size: 14px; 
            color: var(--text-sub); 
            font-weight: 400;
        }

        .content { padding: 24px; background: var(--bg-gray); display: flex; flex-direction: column; gap: 20px; }

        /* 섹션 카드 및 좌측 블루 포인트 바 */
        .card { background: var(--white); border-radius: 18px; padding: 24px; border: 1px solid rgba(0,0,0,0.02); }
        .card-title {
            font-size: 15px; font-weight: 800; color: var(--primary);
            border-left: 4px solid var(--primary); padding-left: 12px; margin-bottom: 24px;
        }

        /* 세그먼트 컨트롤 (모드 전환) */
        .segment { display: flex; background: #EEEFF1; padding: 4px; border-radius: 12px; margin-bottom: 24px; }
        .seg-item {
            flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: 700;
            color: #8B95A1; cursor: pointer; border-radius: 9px; transition: 0.2s;
        }
        .seg-item.active { background: var(--white); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* 입력 그리드 */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field.full { grid-column: span 2; }
        .field label { font-size: 12px; color: var(--text-sub); font-weight: 600; margin-left: 4px; }
        .field input, .field select {
            height: 44px; border: 1px solid var(--border); border-radius: 10px;
            padding: 0 14px; font-size: 14px; font-weight: 700; color: var(--text-main); background: #FDFDFD;
            box-sizing: border-box; outline: none;
        }
        .field input:focus { border-color: var(--primary); background: #fff; }

        /* [결과 리스트 개선] 요청하신 10가지 항목 수용 */
        .result-list { display: flex; flex-direction: column; }
        .result-row { 
            display: flex; justify-content: space-between; padding: 12px 8px; 
            border-bottom: 1px solid #F1F3F5; 
        }
        .result-row:last-child { border-bottom: none; }
        .res-label { font-size: 13px; color: var(--text-muted); }
        .res-value { font-size: 14px; font-weight: 700; color: var(--text-main); text-align: right; }
        .res-value.highlight { color: var(--primary); font-size: 16px; }

        .footer { padding: 0 24px 24px; background: var(--bg-gray); display: flex; justify-content: flex-end; gap: 12px; }
        .btn {
            min-width: 120px; height: 50px; border-radius: 14px; font-size: 15px; font-weight: 700;
            border: none; cursor: pointer; transition: 0.2s;
        }
        .btn-cancel { background: #fff; color: var(--text-sub); border: 1px solid var(--border); }
        .btn-pay { background: var(--primary); color: #fff; flex: 1; max-width: 200px; box-shadow: 0 4px 12px rgba(0,102,255,0.2); }
    </style>
</head>
<body>

<div class="window">
    <div class="header">
        <div class="header-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                <path d="M21 7.28V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-2.28c.59-.35 1-.98 1-1.72V9c0-.74-.41-1.37-1-1.72zM20 9v6h-7V9h7zM5 19V5h14v2h-6c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h6v2H5z"/>
            </svg>
        </div>
        <div class="header-info">
            <h1>통합 결제 테스트</h1>
            <p>신용 및 현금영수증 거래 기능을 실시간으로 테스트합니다.</p>
        </div>
    </div>

    <div class="content">
        <div class="card">
            <div class="card-title">거래 설정</div>
            <div class="segment">
                <div class="seg-item active" onclick="updateFields('credit_appr')">신용승인</div>
                <div class="seg-item" onclick="updateFields('credit_cancel')">신용취소</div>
                <div class="seg-item" onclick="updateFields('cash_appr')">현금승인</div>
                <div class="seg-item" onclick="updateFields('cash_cancel')">현금취소</div>
            </div>
            
            <div class="form-grid" id="formGrid">
                <div class="field full"><label>판매금액</label><input type="text" value="55,000" style="color:var(--primary); font-size:18px;"></div>
                <div class="field"><label>세금</label><input type="text" value="5,000"></div>
                <div class="field"><label>봉사료</label><input type="text" value="0"></div>
                <div class="field"><label>비과세</label><input type="text" value="0"></div>
                <div class="field"><label>할부개월</label><select><option>일시불</option><option>2개월</option><option>3개월</option></select></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">거래 결과 정보</div>
            <div class="result-list">
                <div class="result-row"><span class="res-label">거래일시</span><span class="res-value">2026-03-20 21:12:06</span></div>
                <div class="result-row"><span class="res-label">단말기ID</span><span class="res-value">12345678</span></div>
                <div class="result-row"><span class="res-label">응답코드</span><span class="res-value" style="color:#D32F2F;">0000 (정상)</span></div>
                <div class="result-row"><span class="res-label">카드번호</span><span class="res-value">5243-34**-****-****</span></div>
                <div class="result-row"><span class="res-label">응답내역</span><span class="res-value">정상승인 되었습니다.</span></div>
                <div class="result-row"><span class="res-label">카드사명</span><span class="res-value">삼성카드</span></div>
                <div class="result-row"><span class="res-label">승인번호</span><span class="res-value highlight">30012345</span></div>
                <div class="result-row"><span class="res-label">매입사명</span><span class="res-value">비씨카드</span></div>
                <div class="result-row"><span class="res-label">카드구분</span><span class="res-value">개인신용</span></div>
                <div class="result-row"><span class="res-label">알림</span><span class="res-value">-</span></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="btn btn-cancel">닫기</button>
        <button class="btn btn-pay">테스트 실행</button>
    </div>
</div>

<script>
    function updateFields(mode) {
        const grid = document.getElementById('formGrid');
        const items = document.querySelectorAll('.seg-item');
        items.forEach(i => i.classList.remove('active'));
        event.target.classList.add('active');

        let commonAmount = '<div class="field full"><label>판매금액</label><input type="text" value="55,000" style="color:var(--primary); font-size:18px;"></div>';
        
        if (mode === 'credit_appr') {
            grid.innerHTML = commonAmount + `
                <div class="field"><label>세금</label><input type="text" value="5,000"></div>
                <div class="field"><label>봉사료</label><input type="text" value="0"></div>
                <div class="field"><label>비과세</label><input type="text" value="0"></div>
                <div class="field"><label>할부개월</label><select><option>일시불</option></select></div>`;
        } else if (mode === 'credit_cancel') {
            grid.innerHTML = commonAmount + `
                <div class="field"><label>할부개월</label><select><option>일시불</option></select></div>
                <div class="field"><label>원거래 일자</label><input type="text" placeholder="YYMMDD"></div>
                <div class="field full"><label>원거래 승인번호</label><input type="text"></div>`;
        } else if (mode === 'cash_appr') {
            grid.innerHTML = commonAmount + `
                <div class="field"><label>세금</label><input type="text" value="5,000"></div>
                <div class="field"><label>봉사료</label><input type="text" value="0"></div>
                <div class="field"><label>비과세</label><input type="text" value="0"></div>
                <div class="field"><label>현금영수증 종류</label><select><option>소득공제</option><option>지출증빙</option></select></div>
                <div class="field full"><label>현금영수증 번호</label><input type="text" placeholder="휴대폰/카드번호"></div>`;
        } else if (mode === 'cash_cancel') {
            grid.innerHTML = commonAmount + `
                <div class="field"><label>원거래 일자</label><input type="text" placeholder="YYMMDD"></div>
                <div class="field"><label>원거래 승인번호</label><input type="text"></div>
                <div class="field full"><label>현금영수증 번호</label><input type="text"></div>
                <div class="field full"><label>취소 사유</label><select><option>거래취소</option><option>오입력</option></select></div>`;
        }
    }
</script>

</body>
</html>
